project:
  type: website
  output-dir: _site
  resources:
    - assets/**
    - scripts/**

website:
  title: "Proyecto SLEP"
  description: "Notas de feedback e informe del proyecto semestral con SLEP Los Libertadores."
  site-url: "https://adolforv.github.io/repositorio-SLEP/"
  repo-url: "https://github.com/adolforv/repositorio-SLEP"
  repo-actions: [edit, issue]

  navbar:
    left:
      - text: "Inicio"
        href: index.qmd
      - text: "Documentación"
        href: documentacion.qmd
      - text: "Migrador"
        href: migrador.qmd
      

  page-footer:
    left: |
      Made with [Quarto](https://quarto.org) · Universidad de Chile

  back-to-top-navigation: true

format:
  html:
    theme:
      light: [flatly, assets/styles.scss]
      dark: [darkly, assets/styles.scss]
    respect-user-color-scheme: true
    toc: false
    toc-depth: 3
    toc-title: "En esta página"
    code-fold: true
    code-summary: "Mostrar código"
    code-tools: true
    code-copy: true
    highlight-style: github
    mainfont: "IBM Plex Sans"
    monofont: "IBM Plex Mono"
    smooth-scroll: true
    anchor-sections: true
    footnotes-hover: true
    link-external-icon: true
    link-external-newwindow: true

execute:
  freeze: auto
  warning: false
  message: false
